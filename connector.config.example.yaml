# connector.config.yaml — copy to connector.config.yaml and edit paths.
# Everything environment-specific lives here; CLI flags carry only
# per-run values (--url, --project, --yes).

systemA:
  # Chỉ dùng khi chạy `connect run`/`pipeline` TRỰC TIẾP trên một project
  # có sẵn. Project tạo bằng Project Factory (connect new / connect web)
  # tự sinh config riêng trỏ vào repo của nó — không đụng giá trị này.
  repoPath: /path/to/your-project-repo
  # Relative to repoPath (defaults shown)
  bugsDir: docs/bugs
  backlogFile: docs/sprints/backlog.md

systemB:
  # Nơi ai-automation-framework nằm trên máy. KHÔNG cần clone tay:
  # nếu thư mục chưa tồn tại, connector tự clone từ repoUrl + npm install
  # lần đầu tiên chạy.
  repoPath: tools/ai-automation-framework
  repoUrl: https://github.com/sangvvan/ai-automation-framework
  # Relative to repoPath (defaults shown)
  inputsDir: inputs/projects
  reportsDir: reports

# Roles are OPTIONAL — the connector resolves them in priority order:
#   1. System B already has inputs/projects/{project}.yaml → reused as-is
#      (only baseUrl is updated per run)
#   2. Discovery from System A: app/lib/auth/roles.ts +
#      docs/demo-accounts.md → roles AND auth recipes generated
#      automatically (zero manual System B config for template projects)
#   3. This list, as the fallback for non-template projects.
# authRecipe paths are relative to System B's repo root and must exist
# when set. Omit authRecipe to let System B auto-detect the login form.
# roles:
#   - name: admin
#     authRecipe: inputs/auth/localhost-admin.yaml
#   - name: competence

# Defaults merged into the generated input YAML. These blocks are passed
# through verbatim, so any key System B understands can be set here
# without a connector code change.
crawl:
  maxPages: 50
  maxDepth: 3

generation:
  maxScenariosPerPage: 14
  fallbackSmoke: true

# Run settings passed through verbatim (System B WorkflowInput `run` block:
# testLevel, browsers, nonFunctional toggles, junit, testPlan, ...).
run:
  testLevel: system
  browsers:
    - chromium
  nonFunctional:
    a11y: true
    vitals: true
    securityHeaders: true

# Where connector run summaries (stage timings) are written,
# relative to the connector repo root.
summaryDir: runs

# ── Local LLM (LM Studio / Ollama) cho provider opencode* ───────────────
# Khi tạo project với provider opencode/opencode-ollama, connector tự
# chạy scripts/setup_opencode.sh của project với các giá trị này để pin
# đúng endpoint + model (không cần setup tay từng project).
localLLM:
  baseUrl: http://127.0.0.1:1234/v1
  model: gemma-4-26b-a4b-it-mlx

# ── connect web: Project Factory UI (localhost) ─────────────────────────
# `connect web` mở form tại http://127.0.0.1:{port}: nhập requirement,
# chọn AI provider + deploy target → clone template, sinh config, chạy
# full pipeline, xem log + kết quả ngay trên trang.
web:
  port: 4000
  # Template để clone khi tạo project mới — git URL là đủ, không cần
  # checkout local
  templateRepo: https://github.com/sangvvan/web-automation-develop-template
  # Repo project mới + config/log/summary sinh ra nằm ở đây
  workspaceDir: projects

# ── connect pipeline: cả vòng đời từ MỘT chỗ config ─────────────────────
# `connect pipeline --yes` chạy: requirement → System A agents build →
# deploy → AI test → write-back. Mọi stage gọi script CỦA CHÍNH System A
# (zero-intrusion); bỏ block này nếu chỉ dùng `connect run`.
pipeline:
  project: demo
  # Requirement mặc định (ghi đè per-run bằng --requirement <file>)
  requirementFile: requirement.md
  # BUILD: connector ghi requirement vào `requirementDoc` (trong repo A,
  # theo convention của template) rồi chạy lần lượt `commands` trong repo
  # A. Token: {requirementDoc} = path tương đối của doc vừa ghi,
  # {requirementFile} = path tuyệt đối file gốc. KHÔNG dùng {requirement}
  # (cả văn bản) trong command — run.sh của System A chỉ nhận prompt
  # ngắn/ID, văn bản dài làm vỡ xargs của nó.
  build:
    requirementDoc: docs/requirements/PS-001.md
    commands:
      # Phase 0: problem statement → REQ-*.md
      - ["scripts/legacy/run.sh", "/ps", "Generate versioned requirements (REQ-*.md) from {requirementDoc}", "--provider=claude"]
      # Full pipeline (BA → ... → DevOps) cho mọi requirement vừa sinh
      - ["scripts/legacy/run.sh", "/feature", "all", "--provider=claude"]
  deploy:
    command: ["scripts/deploy.sh", "local"]
    # URL app sau deploy — tự động thành --url cho stage test
    url: http://localhost:3000
    healthTimeoutSec: 180
